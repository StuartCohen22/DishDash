steps:
  # Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dishdash-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dishdash-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '--target'
      - 'production'
      - 'backend/'

  # Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dishdash-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/dishdash-frontend:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - '--target'
      - 'production'
      - '--build-arg'
      - 'VITE_API_URL=${_BACKEND_URL}'
      - 'frontend/'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', 'gcr.io/$PROJECT_ID/dishdash-backend:$COMMIT_SHA']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend-latest'
    args: ['push', 'gcr.io/$PROJECT_ID/dishdash-backend:latest']
    waitFor: ['build-backend']

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', 'gcr.io/$PROJECT_ID/dishdash-frontend:$COMMIT_SHA']
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend-latest'
    args: ['push', 'gcr.io/$PROJECT_ID/dishdash-frontend:latest']
    waitFor: ['build-frontend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dishdash-backend'
      - '--image=gcr.io/$PROJECT_ID/dishdash-backend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_CLOUD_SQL_CONNECTION}'
      - '--set-env-vars=ENVIRONMENT=production,DEBUG=false'
      - '--set-secrets=JWT_SECRET_KEY=jwt-secret:latest,DATABASE_URL=database-url:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
    waitFor: ['push-backend']

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dishdash-frontend'
      - '--image=gcr.io/$PROJECT_ID/dishdash-frontend:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
    waitFor: ['push-frontend']

# Images to store in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/dishdash-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/dishdash-backend:latest'
  - 'gcr.io/$PROJECT_ID/dishdash-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/dishdash-frontend:latest'

# Substitution variables (set in Cloud Build trigger)
substitutions:
  _REGION: 'us-central1'
  _BACKEND_URL: 'https://dishdash-backend-xxxxx.run.app'
  _CLOUD_SQL_CONNECTION: '${PROJECT_ID}:us-central1:dishdash-db'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout (20 minutes)
timeout: '1200s'

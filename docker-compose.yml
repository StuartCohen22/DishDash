version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dishdash-postgres
    environment:
      POSTGRES_USER: dishdash
      POSTGRES_PASSWORD: dishdash_dev
      POSTGRES_DB: dishdash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishdash -d dishdash"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dishdash-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: dishdash-backend
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dishdash:dishdash_dev@postgres:5432/dishdash
      - JWT_SECRET_KEY=dev-secret-key-change-in-production-use-secrets-manager
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ENVIRONMENT=development
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dishdash-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: dishdash-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - dishdash-network

volumes:
  postgres_data:

networks:
  dishdash-network:
    driver: bridge
